<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アナウンス管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="announce.css">
</head>
<body>

  <!-- ヘッダー -->
  <header class="header">
    <span class="header-logo">Novedades</span>
    <button class="burger-btn" id="burger-btn" aria-label="メニュー">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- ドロワー -->
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <nav class="drawer" id="drawer">
    <ul class="drawer-nav">
      <li><a href="../../home/home.html">ホーム</a></li>
      <li class="drawer-divider"></li>
      <li><a href="../../lesson/index.html">レッスン</a></li>
      <li><a href="../../flashcard/index.html">フラッシュカード</a></li>
      <li><a href="../../dictionary/index.html">辞書</a></li>
      <li><a href="../../question/index.html">質問</a></li>
      <li><a href="../../announce/index.html">アナウンス</a></li>
    </ul>
    <button class="logout-btn" id="logout-btn">ログアウト</button>
  </nav>

  <!-- メイン -->
  <main class="main">

    <!-- 検索バー -->
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="キーワードで検索" />
    </div>

    <!-- 一覧 -->
    <ul class="announce-list" id="announce-list"></ul>
    <p class="empty-msg" id="empty-msg">アナウンスはありません</p>

  </main>

  <!-- フッター -->
  <footer class="footer">
    <button class="btn-add" id="btn-add">＋</button>
  </footer>

  <!-- 編集ポップアップ -->
  <div class="popup-overlay" id="popup-edit-overlay">
    <div class="popup" id="popup-edit">
      <button class="popup-close" id="popup-edit-close">✕</button>
      <h2 class="popup-title">アナウンスを編集</h2>
      <div class="popup-form">
        <label>タイトル</label>
        <input type="text" id="edit-title" />
        <label>内容</label>
        <textarea id="edit-content"></textarea>
        <label>URL</label>
        <input type="url" id="edit-url" />
        <label>公開開始日時</label>
        <input type="datetime-local" id="edit-start" />
        <label>公開終了日時（任意）</label>
        <input type="datetime-local" id="edit-end" />
        <label>公開範囲</label>
        <select id="edit-scope">
          <option value="draft">非公開</option>
          <option value="free">Free</option>
          <option value="plus">Plus</option>
          <option value="max">Max</option>
        </select>
      </div>
      <button class="popup-save" id="edit-save">更新する</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="announce.js"></script>
</body>
</html>
