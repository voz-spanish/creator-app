<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホーム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="home.css">
</head>
<body>

  <!-- ヘッダー -->
  <header class="header">
    <span class="header-logo">VOZ</span>
    <button class="burger-btn" id="burger-btn" aria-label="メニュー">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- ドロワーメニュー -->
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <nav class="drawer" id="drawer">
    <ul class="drawer-nav">
      <li><a href="../lesson/lesson.html">レッスン</a></li>
      <li><a href="../flashcard/flashcard.html">フラッシュカード</a></li>
      <li><a href="../dictionary/dictionary.html">辞書</a></li>
      <li><a href="../question/question.html">質問</a></li>
      <li><a href="../announce/announce.html">アナウンス</a></li>
    </ul>
    <button class="logout-btn" id="logout-btn">ログアウト</button>
  </nav>

  <!-- メインコンテンツ -->
  <main class="main">

    <!-- カレンダー -->
    <section class="calendar-section">
      <div class="calendar-header">
        <span class="calendar-month" id="calendar-month"></span>
      </div>
      <div class="calendar-grid">
        <div class="calendar-dow">L</div>
        <div class="calendar-dow">M</div>
        <div class="calendar-dow">M</div>
        <div class="calendar-dow">J</div>
        <div class="calendar-dow">V</div>
        <div class="calendar-dow cal-sat">S</div>
        <div class="calendar-dow cal-sun">D</div>
      </div>
      <div class="calendar-days" id="calendar-days"></div>
    </section>

    <!-- タスク一覧 -->
    <section class="task-section">
      <p class="task-date-label" id="task-date-label"></p>
      <ul class="task-list" id="task-list"></ul>
      <p class="task-empty" id="task-empty">タスクはありません</p>
    </section>

  </main>

  <!-- フッター -->
  <footer class="footer">
    <button class="footer-btn" id="btn-year">2026</button>
    <button class="footer-btn footer-btn--hoy" id="btn-hoy">HOY</button>
    <button class="footer-btn footer-btn--add" id="btn-add">＋</button>
  </footer>

  <!-- 年間カレンダーオーバーレイ -->
  <div class="year-overlay" id="year-overlay">
    <div class="year-overlay-inner">
      <button class="year-close" id="year-close">✕</button>
      <div class="year-grid" id="year-grid"></div>
    </div>
  </div>

  <!-- タスク追加ポップアップ -->
  <div class="popup-overlay" id="popup-add-overlay">
    <div class="popup" id="popup-add">
      <button class="popup-close" id="popup-add-close">✕</button>
      <h2 class="popup-title">タスクを追加</h2>
      <div class="popup-form">
        <input type="text" id="input-title" placeholder="タイトル" />
        <input type="date" id="input-date" />
        <textarea id="input-memo" placeholder="詳細（メモ）"></textarea>
        <input type="url" id="input-url" placeholder="URL" />
      </div>
      <button class="popup-save" id="popup-save">保存</button>
    </div>
  </div>

  <!-- タスク詳細ポップアップ -->
  <div class="popup-overlay" id="popup-detail-overlay">
    <div class="popup" id="popup-detail">
      <button class="popup-close" id="popup-detail-close">✕</button>
      <button class="popup-edit" id="popup-detail-edit">編集</button>
      <h2 class="popup-detail-title" id="popup-detail-title"></h2>
      <p class="popup-detail-memo" id="popup-detail-memo"></p>
      <a class="popup-detail-url" id="popup-detail-url" target="_blank"></a>
      <button class="popup-delete" id="popup-detail-delete">削除</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="home.js"></script>
</body>
</html>
