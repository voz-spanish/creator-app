<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
  <link rel="manifest" href="manifest-admin.json">
  <link rel="apple-touch-icon" href="c-icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="c-icon-512.png">
  <meta name="theme-color" content="#5C3D2E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="VOZ Admin">
</head>
<body>
  <main class="login-wrap">
    <div class="login-card">

      <div class="login-header">
        <p class="label">CONTENT MANAGER</p>
        <h1>Bienvenido</h1>
      </div>

      <div class="login-form">
        <div class="field">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" placeholder="example@mail.com" autocomplete="email">
        </div>
        <div class="field">
          <label for="password">パスワード</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <p class="error-msg" id="error-msg"></p>
        <button id="login-btn">ログイン</button>
      </div>

    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="login.js"></script>
</body>
</html>
