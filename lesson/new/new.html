<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>素材登録</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="new.css">
</head>
<body>

  <header class="header">
    <span class="header-logo">Lesson</span>
    <button class="burger-btn" id="burger-btn" aria-label="メニュー">
      <span></span><span></span><span></span>
    </button>
  </header>

  <div class="drawer-overlay" id="drawer-overlay"></div>
  <nav class="drawer" id="drawer">
    <ul class="drawer-nav">
      <li><a href="../../home/home.html">ホーム</a></li>
      <li class="drawer-divider"></li>
      <li><a href="../../lesson/lesson.html">レッスン</a></li>
      <li><a href="../../flashcard/flashcard.html">フラッシュカード</a></li>
      <li><a href="../../dictionary/dictionary.html">辞書</a></li>
      <li><a href="../../question/question.html">質問</a></li>
      <li><a href="../../announce/announce.html">アナウンス</a></li>
    </ul>
    <button class="logout-btn" id="logout-btn">ログアウト</button>
  </nav>

  <!-- ステップインジケーター -->
  <div class="step-bar">
    <div class="step-item" id="step-1-indicator">
      <div class="step-num">1</div>
      <div class="step-label">基本設定</div>
    </div>
    <div class="step-divider"></div>
    <div class="step-item" id="step-2-indicator">
      <div class="step-num">2</div>
      <div class="step-label">テキスト登録</div>
    </div>
    <div class="step-divider"></div>
    <div class="step-item" id="step-3-indicator">
      <div class="step-num">3</div>
      <div class="step-label">音声紐付け</div>
    </div>
    <div class="step-divider"></div>
    <div class="step-item" id="step-4-indicator">
      <div class="step-num">4</div>
      <div class="step-label">プレビュー</div>
    </div>
  </div>

  <main class="main">

    <!-- Step 1: 基本設定 -->
    <div class="step-content" id="step-1">
      <div class="form-wrap">
        <div class="page-header">
          <a class="back-link" href="../lesson.html">← 一覧に戻る</a>
          <h1 class="page-title">素材を登録する</h1>
        </div>

        <div class="section-card">
          <div class="field">
            <label>タイトル</label>
            <input type="text" id="s1-title" placeholder="素材タイトルを入力" />
          </div>
        </div>

        <div class="section-card">
          <div class="section-card-title">形式</div>
          <div class="type-options">
            <label class="type-option">
              <input type="radio" name="lesson-type" value="youtube" checked />
              <span class="type-option-inner">
                <span class="type-icon">▶</span>
                <span class="type-name">YouTube</span>
                <span class="type-desc">URL埋め込み再生</span>
              </span>
            </label>
            <label class="type-option type-option--disabled">
              <input type="radio" name="lesson-type" value="mp3" disabled />
              <span class="type-option-inner">
                <span class="type-icon">♪</span>
                <span class="type-name">音声ファイル</span>
                <span class="type-desc">近日対応予定</span>
              </span>
            </label>
          </div>
        </div>

        <p class="error-msg" id="s1-error"></p>
      </div>
    </div>

    <!-- Step 2: テキスト登録 -->
    <div class="step-content" id="step-2" style="display:none">
      <div class="form-wrap" style="max-width:100%">
        <div class="page-header" style="padding:0 4px 8px">
          <h2 class="page-title" style="font-size:1.4rem">テキスト登録</h2>
          <p class="input-hint-text">各Audioのスペイン語テキストを入力してください</p>
        </div>
        <div id="text-audio-blocks"></div>
        <button class="btn-add-audio" id="btn-add-text-audio">＋ Audioを追加</button>
        <p class="error-msg" id="s2-error"></p>
      </div>
    </div>

    <!-- Step 3: 音声紐付け -->
    <div class="step-content" id="step-3" style="display:none">
      <div class="youtube-header" id="youtube-header">
        <button class="btn-toggle-player" id="btn-toggle-player" aria-label="動画を折りたたむ">
          <span id="toggle-player-icon">▲</span>
        </button>
        <div class="youtube-player-wrap" id="youtube-player-wrap">
          <div id="youtube-player"></div>
        </div>
        <div class="youtube-id-row">
          <input type="text" id="yt-id-input" placeholder="YouTube 動画ID（例: FoBUU18WGRA）" />
          <button class="btn-load" id="btn-load-yt">読み込む</button>
        </div>
        <div class="audio-current-label" id="audio-current-label"></div>
      </div>
      <div class="audio-blocks" id="timing-audio-blocks"></div>
      <p class="error-msg" id="s3-error" style="padding:0 16px"></p>
    </div>

    <!-- Step 4: プレビュー -->
    <div class="step-content" id="step-4" style="display:none">
      <div class="form-wrap" style="max-width:100%">
        <div class="page-header" style="padding:0 4px 8px">
          <h2 class="page-title" style="font-size:1.4rem">プレビュー</h2>
          <p class="input-hint-text">登録内容を確認してから保存してください</p>
        </div>
        <div id="preview-blocks"></div>
        <p class="error-msg" id="s4-error"></p>
      </div>
    </div>

  </main>

  <footer class="footer-fixed">
    <button class="btn-back-step" id="btn-back-step" style="display:none">← 戻る</button>
    <button class="btn-next-step" id="btn-next-step">作成をはじめる →</button>
    <button class="btn-publish" id="btn-publish" style="display:none">保存する</button>
  </footer>

  <!-- 語彙登録ポップアップ -->
  <div class="popup-overlay" id="popup-vocab-overlay">
    <div class="popup">
      <button class="popup-close" id="popup-vocab-close">✕</button>
      <h2 class="popup-title" id="popup-vocab-title">語彙登録</h2>
      <div id="popup-vocab-content"></div>
    </div>
  </div>

  <!-- 辞書確認ポップアップ -->
  <div class="popup-overlay" id="popup-dict-overlay">
    <div class="popup">
      <button class="popup-close" id="popup-dict-close">✕</button>
      <h2 class="popup-title" id="popup-dict-title">辞書</h2>
      <div id="popup-dict-content"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="new.js"></script>
</body>
</html>
