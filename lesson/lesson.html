<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>素材一覧</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="lesson.css">
</head>
<body>

  <header class="header">
    <span class="header-logo">Lesson</span>
    <button class="burger-btn" id="burger-btn" aria-label="メニュー">
      <span></span><span></span><span></span>
    </button>
  </header>

  <div class="drawer-overlay" id="drawer-overlay"></div>
  <nav class="drawer" id="drawer">
    <ul class="drawer-nav">
      <li><a href="../home/home.html">ホーム</a></li>
      <li class="drawer-divider"></li>
      <li><a href="../lesson/lesson.html">レッスン素材</a></li>
      <li><a href="../lesson-plan/lesson-plan.html">レッスンプラン</a></li>
      <li><a href="../flashcard/flashcard.html">フラッシュカード</a></li>
      <li><a href="../dictionary/dictionary.html">辞書</a></li>
      <li><a href="../question/question.html">質問</a></li>
      <li><a href="../announce/announce.html">アナウンス</a></li>
    </ul>
    <button class="logout-btn" id="logout-btn">ログアウト</button>
  </nav>

  <main class="main">

    <div class="filter-bar">
      <div class="filter-top">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="タイトルで検索" />
      </div>
    </div>

    <!-- 作成中 -->
    <div class="list-section" id="section-draft">
      <div class="list-section-label">作成中</div>
      <ul class="lesson-list" id="list-draft"></ul>
      <p class="empty-sub" id="empty-draft" style="display:none">作成中の素材はありません</p>
    </div>

    <!-- 作成済 -->
    <div class="list-section" id="section-published">
      <div class="list-section-label">作成済</div>
      <ul class="lesson-list" id="list-published"></ul>
      <p class="empty-sub" id="empty-published" style="display:none">作成済の素材はありません</p>
    </div>

  </main>

  <footer class="footer">
    <button class="btn-add" id="btn-add">＋</button>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="lesson.js"></script>
</body>
</html>
